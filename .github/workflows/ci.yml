name: Build & Release

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build
        run: chmod +x mvnw && ./mvnw clean compile -DskipTests

      - name: Run tests
        run: ./mvnw test

  release:
    name: Tag & Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Generate version
        id: version
        run: |
          VERSION="1.0.${{ github.run_number }}"
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set version in POM
        run: |
          chmod +x mvnw
          ./mvnw versions:set -DnewVersion=${{ steps.version.outputs.tag }} -DgenerateBackupPoms=false

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Release v${{ steps.version.outputs.tag }}" || true
          git tag ${{ steps.version.outputs.tag }}
          git push origin master --tags
