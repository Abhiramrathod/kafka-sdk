name: CI Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build
        run: chmod +x mvnw && ./mvnw clean compile -DskipTests

      - name: Upload compiled classes
        uses: actions/upload-artifact@v5
        with:
          name: compiled-classes
          path: |
            */target/classes
          retention-days: 1

  unit-tests:
    name: Unit Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: chmod +x mvnw && ./mvnw test

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-reports
          path: |
            */target/surefire-reports/
          retention-days: 7

  dependency-check:
    name: CVE Scan (OWASP)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: OWASP Dependency Check
        run: chmod +x mvnw && ./mvnw dependency-check:check -Pquality

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: owasp-report
          path: target/dependency-check-report.html
          retention-days: 30

  code-style:
    name: Code Style (Checkstyle)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Checkstyle
        run: chmod +x mvnw && ./mvnw checkstyle:check -Pquality

      - name: Upload Checkstyle report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: checkstyle-report
          path: */target/checkstyle-result.xml
          retention-days: 7

  bug-detection:
    name: Bug Detection (SpotBugs)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: SpotBugs
        run: chmod +x mvnw && ./mvnw spotbugs:check -Pquality

      - name: Upload SpotBugs report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: spotbugs-report
          path: */target/spotbugsXml.xml
          retention-days: 7

  static-analysis:
    name: Static Analysis (PMD)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: PMD
        run: chmod +x mvnw && ./mvnw pmd:check -Pquality

      - name: Upload PMD report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: pmd-report
          path: */target/pmd.xml
          retention-days: 7

  quality-gate:
    name: Quality Gate
    needs: [unit-tests, dependency-check, code-style, bug-detection, static-analysis]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Evaluate gate
        run: |
          results=("${{ needs.unit-tests.result }}" \
                   "${{ needs.dependency-check.result }}" \
                   "${{ needs.code-style.result }}" \
                   "${{ needs.bug-detection.result }}" \
                   "${{ needs.static-analysis.result }}")
          for r in "${results[@]}"; do
            if [ "$r" != "success" ]; then
              echo "Pipeline failed: $r"
              exit 1
            fi
          done
          echo "All checks passed"
